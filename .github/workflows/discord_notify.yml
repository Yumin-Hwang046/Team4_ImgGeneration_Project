name: Discord Notification

on:
  push:
    branches:
      - main
      - dev
      - feature/*
  pull_request:
    types: [opened, closed, reopened]
  issues:
    types: [opened, closed]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord Notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          EVENT="${{ github.event_name }}"
          ACTOR="${{ github.actor }}"
          REPO="${{ github.repository }}"

          if [ "$EVENT" = "push" ]; then
            MSG="📦 **[PUSH]** \`$REPO\`\n👤 $ACTOR → \`${{ github.ref_name }}\`\n💬 ${{ github.event.head_commit.message }}"
          elif [ "$EVENT" = "pull_request" ]; then
            MSG="🔀 **[PR ${{ github.event.action }}]** \`$REPO\`\n👤 $ACTOR\n📝 ${{ github.event.pull_request.title }}\n🔗 ${{ github.event.pull_request.html_url }}"
          elif [ "$EVENT" = "issues" ]; then
            MSG="🐛 **[ISSUE ${{ github.event.action }}]** \`$REPO\`\n👤 $ACTOR\n📝 ${{ github.event.issue.title }}"
          fi

          curl -H "Content-Type: application/json" \
            -d "{\"content\": \"$MSG\"}" \
            "$DISCORD_WEBHOOK_URL"
