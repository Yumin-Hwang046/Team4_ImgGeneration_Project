<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: {{ width }}px; height: {{ height }}px; overflow: hidden; }

    .bg {
      position: absolute; inset: 0;
      background-image: url('data:image/png;base64,{{ image_b64 }}');
      background-size: cover;
      background-position: center;
    }

    .scrim {
      position: absolute; inset: 0;
      background: linear-gradient(
        160deg,
        transparent 20%,
        rgba(22, 10, 3, 0.45) 55%,
        rgba(14, 6, 1, 0.90) 100%
      );
    }

    .content {
      position: absolute;
      bottom: 0; left: 0;
      padding: {{ (padding * 0.8) | int }}px {{ padding }}px {{ bottom_padding }}px;
      max-width: {{ (width * 0.80) | int }}px;
    }

    .eyebrow {
      font-family: 'Pretendard', sans-serif;
      font-size: {{ (detail_size * 0.78) | int }}px;
      font-weight: 500;
      color: rgba(255, 205, 120, 0.72);
      letter-spacing: 0.26em;
      text-transform: uppercase;
      margin-bottom: {{ (detail_size * 1.0) | int }}px;
    }

    .headline {
      font-family: 'Nanum Myeongjo', serif;
      font-size: {{ (headline_size * 1.08) | int }}px;
      font-weight: 800;
      color: #fff9f2;
      line-height: 1.22;
      letter-spacing: 0.00em;
      margin-bottom: {{ (headline_size * 0.20) | int }}px;
      word-break: keep-all;
    }

    .divider {
      width: {{ (headline_size * 0.48) | int }}px;
      height: 1px;
      background: rgba(255, 195, 105, 0.42);
      margin-bottom: {{ (tagline_size * 0.65) | int }}px;
    }

    .tagline {
      font-family: 'Nanum Myeongjo', serif;
      font-size: {{ tagline_size }}px;
      font-weight: 400;
      color: rgba(255, 228, 185, 0.68);
      line-height: 1.70;
      letter-spacing: 0.01em;
      margin-bottom: {{ (detail_size * 0.8) | int }}px;
      word-break: keep-all;
    }

    .details {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: {{ (detail_size * 0.28) | int }}px {{ (detail_size * 0.72) | int }}px;
    }

    .details li {
      font-family: 'Pretendard', sans-serif;
      font-size: {{ (detail_size * 0.78) | int }}px;
      font-weight: 400;
      color: rgba(255, 210, 150, 0.48);
      letter-spacing: 0.04em;
    }

    .details li::before {
      content: '· ';
      color: rgba(255, 195, 105, 0.42);
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="scrim"></div>
  <div class="content">
    <div class="eyebrow">Handcrafted</div>
    <div class="headline">{{ headline }}</div>
    <div class="divider"></div>
    {% if tagline %}<div class="tagline">{{ tagline }}</div>{% endif %}
    {% if details %}
    <ul class="details">
      {% for d in details %}<li>{{ d }}</li>{% endfor %}
    </ul>
    {% endif %}
  </div>
</body>
</html>
