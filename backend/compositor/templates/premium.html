<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: {{ width }}px; height: {{ height }}px; overflow: hidden; }

    .bg {
      position: absolute; inset: 0;
      background-image: url('data:image/png;base64,{{ image_b64 }}');
      background-size: cover;
      background-position: center;
    }

    .scrim {
      position: absolute; inset: 0;
      background: linear-gradient(
        to top,
        rgba(4, 4, 2, 0.94) 0%,
        rgba(4, 4, 2, 0.52) 30%,
        rgba(4, 4, 2, 0.08) 58%,
        transparent 75%
      );
    }

    .content {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: {{ (padding * 1.0) | int }}px {{ (padding * 1.8) | int }}px {{ bottom_padding }}px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .gold-line-top {
      width: {{ (headline_size * 1.0) | int }}px;
      height: 1px;
      background: linear-gradient(to right, transparent, #c9a96e, transparent);
      margin-bottom: {{ (headline_size * 0.30) | int }}px;
    }

    .headline {
      font-family: 'Noto Serif KR', serif;
      font-size: {{ headline_size }}px;
      font-weight: 300;
      color: #f5f0e8;
      line-height: 1.32;
      letter-spacing: 0.04em;
      margin-bottom: {{ (headline_size * 0.26) | int }}px;
      word-break: keep-all;
    }

    .gold-line-bottom {
      width: {{ (headline_size * 0.50) | int }}px;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(201, 169, 110, 0.60), transparent);
      margin-bottom: {{ (tagline_size * 0.70) | int }}px;
    }

    .tagline {
      font-family: 'Noto Serif KR', serif;
      font-size: {{ tagline_size }}px;
      font-weight: 300;
      color: rgba(208, 190, 158, 0.68);
      letter-spacing: 0.06em;
      line-height: 1.68;
      margin-bottom: {{ (tagline_size * 0.55) | int }}px;
      word-break: keep-all;
    }

    .details {
      list-style: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: {{ (detail_size * 0.30) | int }}px;
    }

    .details li {
      font-family: 'Pretendard', sans-serif;
      font-size: {{ (detail_size * 0.85) | int }}px;
      font-weight: 300;
      color: rgba(172, 152, 115, 0.50);
      letter-spacing: 0.12em;
    }

    .details li::before {
      content: '— ';
      color: rgba(201, 169, 110, 0.36);
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="scrim"></div>
  <div class="content">
    <div class="gold-line-top"></div>
    <div class="headline">{{ headline }}</div>
    <div class="gold-line-bottom"></div>
    {% if tagline %}<div class="tagline">{{ tagline }}</div>{% endif %}
    {% if details %}
    <ul class="details">
      {% for d in details %}<li>{{ d }}</li>{% endfor %}
    </ul>
    {% endif %}
  </div>
</body>
</html>
