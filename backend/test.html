<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>API 테스트</title>
  <style>
    body { font-family: sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; }
    textarea { width: 100%; height: 80px; margin: 8px 0; }
    input[type="file"], input[type="text"], select { width: 100%; margin: 8px 0; padding: 6px; }
    button { padding: 10px 24px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; }
    button:disabled { background: #93c5fd; }
    #result img { max-width: 100%; margin-top: 16px; border-radius: 8px; }
    #result pre { background: #f1f5f9; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 13px; }
    label { font-weight: bold; display: block; margin-top: 12px; }
    #status { margin: 12px 0; color: #64748b; }
  </style>
</head>
<body>
  <h2>광고 생성 테스트</h2>

  <label>이미지 (필수)</label>
  <input type="file" id="image" accept="image/jpeg,image/png,image/webp">

  <label>무드</label>
  <select id="mood">
    <option>깔끔한 상품 홍보</option>
    <option>따뜻한 매장 분위기</option>
    <option>트렌디한 메뉴 홍보</option>
    <option>프리미엄 매장·상품</option>
  </select>

  <label>피사체 유형</label>
  <select id="subject_type">
    <option value="food">food</option>
    <option value="product">product</option>
  </select>

  <label>사이즈</label>
  <select id="size">
    <option value="square">square (1024×1024)</option>
    <option value="portrait">portrait (1024×1792)</option>
    <option value="landscape">landscape (1792×1024)</option>
    <option value="naver">naver (860×1200)</option>
  </select>

  <label>레퍼런스 이미지 (선택 — 있으면 SDXL+IP-Adapter, 없으면 DALL-E 3)</label>
  <input type="file" id="ref_image" accept="image/jpeg,image/png">

  <label>추가 요청사항 (선택)</label>
  <input type="text" id="user_prompt" placeholder="예: 가격 9900원 강조, 여름 느낌">

  <br><br>
  <button id="btn" onclick="generate()">생성하기</button>
  <div id="status"></div>
  <div id="result"></div>

  <script>
    async function generate() {
      const imageFile = document.getElementById('image').files[0];
      if (!imageFile) { alert('이미지를 선택해주세요.'); return; }

      const btn = document.getElementById('btn');
      const status = document.getElementById('status');
      const result = document.getElementById('result');

      btn.disabled = true;
      status.textContent = '생성 중... (시간이 걸릴 수 있어요)';
      result.innerHTML = '';

      const form = new FormData();
      form.append('image', imageFile);
      form.append('mood', document.getElementById('mood').value);
      form.append('subject_type', document.getElementById('subject_type').value);
      form.append('size', document.getElementById('size').value);
      form.append('user_prompt', document.getElementById('user_prompt').value);
      const refFile = document.getElementById('ref_image').files[0];
      if (refFile) form.append('ref_image', refFile);

      try {
        const res = await fetch('http://localhost:8000/api/generate', { method: 'POST', body: form });
        const data = await res.json();

        if (!res.ok) {
          result.innerHTML = `<pre>에러: ${JSON.stringify(data, null, 2)}</pre>`;
          return;
        }

        let html = `<p><strong>상품 설명:</strong> ${data.product_description}</p>`;
        html += `<p><strong>해시태그:</strong> ${data.hashtags.join(' ')}</p>`;
        data.results.forEach((r, i) => {
          html += `<p><strong>광고 문구 ${i+1}:</strong> ${r.ad_copy}</p>`;
          html += `<img src="data:image/jpeg;base64,${r.image_b64}" alt="결과 이미지">`;
        });
        result.innerHTML = html;
        status.textContent = '완료!';
      } catch (e) {
        result.innerHTML = `<pre>연결 실패: ${e.message}</pre>`;
        status.textContent = '';
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
