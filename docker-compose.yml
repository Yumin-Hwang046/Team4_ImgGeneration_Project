services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: "1234"
      MYSQL_DATABASE: team4_project
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    environment:
      - IMAGE_GENERATOR_URL=http://model:8001/generate-image
      - TEXT_GENERATOR_URL=http://model:8001/generate-text
      - DATABASE_URL=mysql+pymysql://root:1234@db:3306/team4_project
    depends_on:
      - db
      - model
    restart: unless-stopped

  model:
    build:
      context: .
      dockerfile: model-server/Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - /home/apple/.cache/huggingface:/root/.cache/huggingface:ro
      - /home/apple/Team4_ImgGeneration_Project/backend/image_generator:/app/image_generator:ro
      - /home/apple/Team4_ImgGeneration_Project/backend/text_generator:/app/text_generator:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  db_data:
